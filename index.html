<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes">
    <title>MajdataViewBeta</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
    <style>
      /* Fill the whole browser viewport with the game canvas on every device;
         the engine matches the render target to the canvas CSS size * devicePixelRatio. */
      html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #231F20; }
      #unity-container { position: absolute; left: 0; top: 0; width: 100%; height: 100%; }
      #unity-canvas { width: 100%; height: 100%; display: block; background: #231F20; }
      #unity-footer { display: none; }
    </style>
  </head>
  <body>
    <div id="unity-container" class="unity-desktop">
      <canvas id="unity-canvas" width=960 height=600 tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"> </div>
      <div id="unity-footer">
        <div id="unity-logo-title-footer"></div>
        <div id="unity-fullscreen-button"></div>
        <div id="unity-build-title">MajdataViewBeta</div>
      </div>
    </div>
    <script>
      // Unity's WebGL audio emulation assumes a fixed 44100Hz output rate, but the
      // browser decodes clips at the hardware AudioContext rate (often 48000Hz); the
      // engine then applies a spurious 48000/44100 playbackRate and every downloaded
      // clip plays ~8.8% fast and sharp. Forcing all AudioContexts to 44100Hz keeps
      // the two rates equal, so the correction factor stays exactly 1 on any machine.
      (function () {
        var Native = window.AudioContext || window.webkitAudioContext;
        if (!Native) return;
        var Patched = function (options) {
          options = options || {};
          if (!options.sampleRate) options.sampleRate = 44100;
          try { return new Native(options); }
          catch (e) { return new Native(); } // old Safari: no sampleRate option
        };
        Patched.prototype = Native.prototype;
        window.AudioContext = Patched;
        if (window.webkitAudioContext) window.webkitAudioContext = Patched;
      })();

      var canvas = document.querySelector("#unity-canvas");

      // Shows a temporary message banner/ribbon for a few seconds, or
      // a permanent error message on top of the canvas if type=='error'.
      // If type=='warning', a yellow highlight color is used.
      function unityShowBanner(msg, type) {
        var warningBanner = document.querySelector("#unity-warning");
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') div.style = 'background: red; padding: 10px;';
        else {
          if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/MajdataViewBeta-Web.loader.js";
      var config = {
        arguments: [],
        dataUrl: buildUrl + "/MajdataViewBeta-Web.data.unityweb",
        frameworkUrl: buildUrl + "/MajdataViewBeta-Web.framework.js.unityweb",
        codeUrl: buildUrl + "/MajdataViewBeta-Web.wasm.unityweb",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "Jian",
        productName: "MajdataViewBeta",
        productVersion: "v0.1.0",
        showBanner: unityShowBanner,
      };

      // Persist everything written under Application.persistentDataPath (editor settings,
      // autosaves, the imported web chart) into IndexedDB automatically.
      config.autoSyncPersistentDataPath = true;

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        document.querySelector("#unity-container").className = "unity-mobile";
        canvas.className = "unity-mobile";
      }

      document.querySelector("#unity-loading-bar").style.display = "block";

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          document.querySelector("#unity-progress-bar-full").style.width = 100 * progress + "%";
              }).then((unityInstance) => {
                document.querySelector("#unity-loading-bar").style.display = "none";
                document.querySelector("#unity-fullscreen-button").onclick = () => {
                  unityInstance.SetFullscreen(1);
                };
              }).catch((message) => {
                alert(message);
              });
            };

      document.body.appendChild(script);

    </script>
  </body>
</html>
